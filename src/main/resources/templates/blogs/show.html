<!DOCTYPE html>
<html lang="ja" xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事詳細</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
        <span></span>
    </div>
    <h1 class="page-title">ブログ記事一覧</h1>

    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="/blogs">一覧に戻る</a></li>
            <li><a href="/blogs/new">新規作成</a></li>
        </ul>
    </nav>
</header>

    <main style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
        <h2 th:text="${blog.title}" style="border-bottom: 2px solid #333; padding-bottom: 10px;">タイトル</h2>
        
        <div th:text="${blog.content}" style="line-height: 1.8; margin-top: 20px; white-space: pre-wrap;">
            内容がここに表示されます
        </div>
    </main>
    <script th:src="@{/js/script.js}"></script>
</body>
</html>
