<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事の追加</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <h1 class="page-title">新規追加</h1>
    <nav class="nav-menu" id="nav-menu">
        <ul>
            <li><a href="/blogs">一覧に戻る</a></li>
            <li><a href="/blogs/new">新規作成</a></li>
        </ul>
    </nav>
</header>

<main>
    <form th:action="@{/blogs}" method="post" class="post-form">
        <div class="form-group">
            <label for="title">タイトル</label>
            <input type="text" id="title" name="title" placeholder="タイトルの入力..." required>
        </div>
        
        <div class="form-group">
            <label for="content">内容</label>
            <textarea id="content" name="content" rows="10" placeholder="内容の入力..." required></textarea>
        </div>
        
        <button type="submit" class="submit-btn">投稿する</button>
    </form>
</main>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
